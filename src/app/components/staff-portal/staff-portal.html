<div class="staff-page">

  <!-- TOP NAVBAR -->
  <header class="topbar">

    <div class="brand">
      <span class="logo">Swingles</span>
      <span class="sub">PUB & CHISANYAMA</span>
    </div>

    <nav class="main-nav">
      <a mat-button>HOME</a>
      <a mat-button>MENU</a>
      <a mat-button>EVENTS</a>
      <a mat-button>BOOK A TABLE</a>
      <a mat-button>MEMBERSHIP</a>
    </nav>

    <button mat-stroked-button class="signin-btn">
      SIGN IN
    </button>

  </header>

  <!-- CONTENT -->
  <section class="content">

    <p class="section-label">STAFF CONSOLE</p>

    <h1 class="page-title">
      The <span>back of house.</span>
    </h1>

    <!-- TABS -->
    <div class="staff-tabs">
      <button 
      mat-button
    routerLink="/staff-portal/verify"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
      
      >VERIFY</button>
      <button 
        mat-button
        routerLink="/staff-portal/orders"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >ORDERS</button>
      <button 
        mat-button
        routerLink="/staff-portal/shifts"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      
      >SHIFTS</button>
      <button 
        mat-button
        routerLink="/staff-portal/report"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >REPORTS</button>
      <button 
        mat-button
        routerLink="/staff-portal/create-events"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      
      >EVENTS</button>

      <button
         mat-button
        routerLink="/staff-portal/employees"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >
        EMPLOYEES
      </button>
    </div>

       <router-outlet/> 

  </section>

</div>
